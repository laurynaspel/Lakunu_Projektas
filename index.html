<!DOCTYPE html>
<html lang="lt">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TECHIN - Lankytojo registracija</title>
    <link rel="stylesheet" href="CSS/style.css">

    <!-- EmailJS -->
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

    <!-- JS scripts -->
    <script src="JS/navigation.js" defer></script>
    <script src="JS/validation.js" defer></script>
    <script src="JS/email.js"></script>
    <script src="JS/time.js" defer></script>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:ital,opsz,wght@0,6..12,200..1000;1,6..12,200..1000&display=swap" rel="stylesheet">
</head>

<body>
    <div class="container">
        <!-- Always Aside -->
        <aside>
            <div class="time-date">
                <div class="date" id="date">Kovo 27</div>
                <div class="time" id="time">23:59</div>
            </div>
            <div class="techin-logo"><img src="IMG/Techin_light.webp" alt="Techin Logo"></div>
        </aside>
        <!-- Main content changes based on screen -->
        <main>
            <!-- Welcome Screen -->
            <div class="welcome" id="welcomePage">
                <h1>Sveiki atvykę</h1>
                <hr>
                <button type="button" class="welcome-btn" id="forwardButton">Pradėti registraciją</button>
            </div>
            <!-- Registration Form -->
            <div class="registration" id="registrationPage">
                <h1>Lankytojo registracija</h1>
                <form id="form" action="#">
                    <label for="userName">Vardas:</label>
                    <input type="text" name="userName" id="userName">
                    
                    <label for="userSurname">Pavardė:</label>
                    <input type="text" name="userSurname" id="userSurname">
                
                    <label for="goal">Vizito tikslas:</label>
                    <select name="goal" id="goal">
                        <option value="">Pasirink</option>
                        <option value="Dėl mokslų">Dėl mokslų</option>
                        <option value="Dėl dokumentų">Dėl dokumentų</option>
                        <option value="Konsultacijai">Konsultacijai</option>
                        <option value="Suderintas vizitas">Suderintas vizitas</option>
                        <option value="Kita">Kita</option>
                    </select>
                
                    <div id="otherBox" style="display: none;">
                        <label for="otherReason">Įrašyk priežastį:</label>
                        <textarea name="otherReason" id="otherReason"></textarea>
                    </div>
                
                    <p>Pas ką atėjai:</p>
                    <select name="teacherName" id="teachers">
                        <option value="">Pasirink</option>
                    </select>
            
                    <button>Testi</button>
                    <button type="reset" id="backButton">Atgal</button>
                </form>
            </div>
            <!-- Directions -->
            <div class="directions" id="directionPage">
                <h1>Kelio nurodymai</h1>
                <button type="button" id="forwardButton">Baigti</button>
            </div>
            <!-- Confirmation -->
            <div class="done" id="succefulPage">
                <img src="IMG/check_ligth.svg" alt="Confirmation">
                <h1>Registracija sėkminga!</h1>
                <p>Darbuotojas informuotas apie Jūsų atvykimą</p>
                <img src="IMG/mail_light.svg" alt="Mail Icon">
                <button type="button" id="lastButton">Baigti</button>
            </div>
        </main>
        <div class="buttons">
            <div class="languages">
                <button class="lang-btn active" onclick="setLang('lt')">LT</button>
                <button class="lang-btn" onclick="setLang('en')">EN</button>
            </div>
            <div class="theme">
                <button class="theme-btn active" onclick="setTheme('dark')"><img src="IMG/dark_mode.svg"
                        alt="dark mode"></button>
                <button class="theme-btn" onclick="setTheme('light')"><img src="IMG/light_mode.svg"
                        alt="light mode"></button>
            </div>
        </div>
    </div>
</body>

</html>
