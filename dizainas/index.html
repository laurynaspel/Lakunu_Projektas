<!DOCTYPE html>
<html lang="lt">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TECHIN - Lankytojo registracija</title>
    <link rel="stylesheet" href="CSS/style.css">
    <script src="JS/script.js" defer></script>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:ital,opsz,wght@0,6..12,200..1000;1,6..12,200..1000&display=swap" rel="stylesheet">
</head>

<body>
    <div class="container">
        <!-- Always Aside -->
        <aside>
            <div class="time-date">
                <div class="date">Kovo 27</div>
                <div class="time">23:59</div>
            </div>
            <div class="techin-logo"><img src="IMG/Techin_light.webp" alt="Techin Logo"></div>
        </aside>
        <!-- Main content changes based on screen -->
        <main>
            <!-- Welcome Screen -->
            <div class="welcome">
                <h1>Sveiki atvykę</h1>
                <hr>
                <button type="button" class="welcome-btn">Pradėti registraciją</button>
            </div>
            <!-- Registration Form -->
            <div class="registration">
                <h1>Lankytojo registracija</h1>
                <form action="#">
                    <label for="Name">Vardas</label>
                    <input type="text" id="Name" name="Name">
                    <label for="Surname">Pavardė</label>
                    <input type="text" id="Surname" name="Surname">
                    <label for="Goal">Apsilankymo tikslas</label>
                    <select name="Goal" id="Goal">
                        <option value="Tea">Arbatos isgert</option>
                        <option value="consultation">Konsultacija</option>
                        <option value="meeting">Susitikimas</option>
                        <option value="other">Kita</option>
                    </select>
                    <textarea name="if_other" id="if_other" placeholder='Jei pasirinkote „Kita", čia įveskite priežastį:' maxlength="100"
                        rows="4"></textarea>
                    <label for="Person">Vizitas pas</label>
                    <select name="Person" id="Person">
                        <option value="dr Smith">Dr. Smith</option>
                        <option value="dr Johnson">Dr. Johnson</option>
                        <option value="dr Williams">Dr. Williams</option>
                    </select>
                    <button type="button">Tęsti</button>
                    <button type="button">Atgal</button>
                </form>
            </div>
            <!-- Directions -->
            <!-- <div class="directions">
                <h1>Kelio nurodymai</h1>
                <button type="button">Baigti</button>
            </div> -->
            <!-- Confirmation -->
            <div class="done">
                <img src="IMG/check_light.svg" alt="Confirmation">
                <h1>Registracija sėkminga!</h1>
                <p>Darbuotojas informuotas apie Jūsų atvykimą</p>
                <img src="IMG/mail_light.svg" alt="Mail Icon">
                <button type="button">Baigti</button>
            </div>
        </main>
        <div class="buttons">
            <div class="languages">
                <button class="lang-btn active" onclick="setLang('lt')">LT</button>
                <button class="lang-btn" onclick="setLang('en')">EN</button>
            </div>
            <div class="theme">
                <button class="theme-btn active" onclick="setTheme('dark')"><img src="IMG/dark_mode.svg"
                        alt="dark mode"></button>
                <button class="theme-btn" onclick="setTheme('light')"><img src="IMG/light_mode.svg"
                        alt="light mode"></button>
            </div>
        </div>
    </div>
</body>

</html>
