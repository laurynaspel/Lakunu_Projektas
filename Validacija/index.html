<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vizito forma</title>
    <link rel="stylesheet" href="style.css">

    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <script src="js/script.js" defer></script>
</head>
<body>
    <form id="form">
        <p>Vardas:</p>
        <input type="text" name="userName" id="userName">

        <p>Pavardė:</p>
        <input type="text" name="userSurname" id="userSurname">

        <p>Vizito tikslas:</p>
        <select name="goal" id="goal">
            <option value="">Pasirink</option>
            <option value="Dėl mokslų">Dėl mokslų</option>
            <option value="Dėl dokumentų">Dėl dokumentų</option>
            <option value="Konsultacijai">Konsultacijai</option>
            <option value="Suderintas vizitas">Suderintas vizitas</option>
            <option value="Kita">Kita</option>
        </select>

        <div id="otherBox" style="display: none;">
            <p>Įrašyk priežastį:</p>
            <textarea name="otherReason" id="otherReason"></textarea>
        </div>

        <p>Pas ką atėjai:</p>
        <select name="teacherName" id="teachers">
            <option value="">Pasirink</option>
        </select>

        <input type="hidden" name="email" id="email">

        <br>
        <button type="submit">Siųsti</button>
    </form>
</body>
</html>
